name: Package & Release

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms"
        required: true
        default: "macos"
        type: choice
        options:
          - macos
          - windows
          - all

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
    steps:
      - id: matrix
        run: |
          case "${{ github.event.inputs.platforms }}" in
            macos)
              echo 'result={"include":[{"os":"macos-latest","platform":"macos","arch":"arm64"},{"os":"macos-13","platform":"macos-x64","arch":"x64"}]}' >> $GITHUB_OUTPUT
              ;;
            windows)
              echo 'result={"include":[{"os":"windows-latest","platform":"windows","arch":"x64"}]}' >> $GITHUB_OUTPUT
              ;;
            all)
              echo 'result={"include":[{"os":"macos-latest","platform":"macos","arch":"arm64"},{"os":"macos-13","platform":"macos-x64","arch":"x64"},{"os":"windows-latest","platform":"windows","arch":"x64"}]}' >> $GITHUB_OUTPUT
              ;;
          esac

  package:
    needs: prepare
    env:
      MAC_CERT: ${{ secrets.MAC_CERT }}
      MAC_CERT_PWD: ${{ secrets.MAC_CERT_PWD }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install desktop dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Build services
        working-directory: ./desktop
        run: npm run build:services

      - name: Clean dist
        working-directory: ./desktop
        run: npx ts-node ./.erb/scripts/clean.js dist

      - name: Build Electron app
        working-directory: ./desktop
        run: npm run build

      - name: Package Electron app (macOS signed)
        if: startsWith(matrix.platform, 'macos') && env.MAC_CERT != '' && env.MAC_CERT_PWD != ''
        working-directory: ./desktop
        run: npx electron-builder build --publish never --${{ matrix.arch }}
        env:
          CSC_LINK: ${{ env.MAC_CERT }}
          CSC_KEY_PASSWORD: ${{ env.MAC_CERT_PWD }}

      - name: Package Electron app (macOS unsigned)
        if: startsWith(matrix.platform, 'macos') && (env.MAC_CERT == '' || env.MAC_CERT_PWD == '')
        working-directory: ./desktop
        run: npx electron-builder build --publish never --${{ matrix.arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package Electron app (Windows)
        if: ${{ !startsWith(matrix.platform, 'macos') }}
        working-directory: ./desktop
        run: npx electron-builder build --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coco-installer-${{ matrix.platform }}
          path: |
            desktop/release/build/**/*.dmg
            desktop/release/build/**/*.zip
            desktop/release/build/**/*.exe
          retention-days: 7
          compression-level: 6
          if-no-files-found: error

  release:
    needs: package
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Coco ${{ github.ref_name }} Build ${{ github.run_number }}
          tag_name: build-${{ github.run_number }}
          files: artifacts/**
          draft: false
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
